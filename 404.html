<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Not Found — Trung Pham</title>
  <link rel="icon" type="image/svg+xml" href="/assets/img/favicon.svg">

  <script>
    (function () {
      try {
        var saved = localStorage.getItem('theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.setAttribute('data-theme', saved || (prefersDark ? 'dark' : 'light'));
      } catch (e) {}
    })();
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Instrument+Serif&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
  <main class="content" style="text-align:center; padding-top:5rem;">
    <h1 style="font-family: var(--font-serif); font-weight:400; font-size:5rem; margin: 0 0 .5rem;">404</h1>
    <p style="color: var(--text-muted); margin-bottom:2rem;">This page wandered off into the latent space.</p>
    <p><a href="/">← Back home</a></p>
  </main>
</body>
</html>
