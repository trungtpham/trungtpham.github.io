<?xml version="1.0" encoding="UTF-8"?>
<!--
  Ambient background for trungtpham.github.io — "World Model Horizon".

  A cinematic single-image composition:
    * a perspective ground grid receding from the viewer to a horizon
    * a bright green horizon line and glow
    * a wireframe cube floating above the horizon (the "world model")
    * a green planned trajectory arcing from the foreground up to the cube
    * lidar sweeps radiating from the ego position at the bottom
    * point-cloud dots on the ground plane (denser near mid-distance)
    * a few dashed detection bounding boxes at varying depths
    * subtle "sky" particles above the horizon

  Rendered in white + green so it composes on any dark background; the
  CSS uses `filter: invert(1) hue-rotate(180deg)` in the light theme
  to flip it to dark ink while keeping the green highlights green.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000"
     preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <!-- Soft radial vignette that focuses attention on the horizon -->
    <radialGradient id="fade" cx="50%" cy="45%" r="72%">
      <stop offset="0%"   stop-color="#fff" stop-opacity="1"/>
      <stop offset="60%"  stop-color="#fff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <mask id="vignette">
      <rect width="100%" height="100%" fill="url(#fade)"/>
    </mask>

    <!-- Broad horizon glow -->
    <radialGradient id="hGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#9ee600" stop-opacity="0.55"/>
      <stop offset="35%"  stop-color="#9ee600" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#9ee600" stop-opacity="0"/>
    </radialGradient>
    <!-- Tight glow behind the world-model cube -->
    <radialGradient id="cGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%"   stop-color="#9ee600" stop-opacity="0.85"/>
      <stop offset="55%"  stop-color="#9ee600" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#9ee600" stop-opacity="0"/>
    </radialGradient>

    <style>
      .s   { stroke: #ffffff; fill: none; }
      .f   { fill: #ffffff; }
      .b   { stroke: #9ee600; }
      .bf  { fill: #9ee600; }
      .lbl { font-family: 'JetBrains Mono', ui-monospace, 'SF Mono', monospace;
             font-size: 11px; letter-spacing: 0.22em;
             fill: #ffffff; fill-opacity: 0.45; }
    </style>
  </defs>

  <g mask="url(#vignette)">

    <!-- ===================== PERSPECTIVE GROUND GRID ===================== -->
    <!-- Vertical lines converging to the vanishing point at (800, 440) -->
    <g class="s" stroke-opacity="0.16" stroke-width="1">
      <line x1="-600" y1="1000" x2="800" y2="440"/>
      <line x1="-300" y1="1000" x2="800" y2="440"/>
      <line x1="-50"  y1="1000" x2="800" y2="440"/>
      <line x1="180"  y1="1000" x2="800" y2="440"/>
      <line x1="380"  y1="1000" x2="800" y2="440"/>
      <line x1="560"  y1="1000" x2="800" y2="440"/>
      <line x1="700"  y1="1000" x2="800" y2="440"/>
      <line x1="900"  y1="1000" x2="800" y2="440"/>
      <line x1="1040" y1="1000" x2="800" y2="440"/>
      <line x1="1220" y1="1000" x2="800" y2="440"/>
      <line x1="1420" y1="1000" x2="800" y2="440"/>
      <line x1="1650" y1="1000" x2="800" y2="440"/>
      <line x1="1900" y1="1000" x2="800" y2="440"/>
      <line x1="2200" y1="1000" x2="800" y2="440"/>
    </g>
    <!-- Horizontal receding lines (spacing compressed near horizon) -->
    <g class="s" stroke-opacity="0.14" stroke-width="1">
      <line x1="0" y1="452"  x2="1600" y2="452"/>
      <line x1="0" y1="468"  x2="1600" y2="468"/>
      <line x1="0" y1="492"  x2="1600" y2="492"/>
      <line x1="0" y1="525"  x2="1600" y2="525"/>
      <line x1="0" y1="575"  x2="1600" y2="575"/>
      <line x1="0" y1="645"  x2="1600" y2="645"/>
      <line x1="0" y1="745"  x2="1600" y2="745"/>
      <line x1="0" y1="880"  x2="1600" y2="880"/>
    </g>

    <!-- ===================== HORIZON ===================== -->
    <ellipse cx="800" cy="440" rx="700" ry="180" fill="url(#hGlow)"/>
    <line x1="0" y1="440" x2="1600" y2="440"
          stroke="#9ee600" stroke-opacity="0.55" stroke-width="1"/>

    <!-- ===================== SKY PARTICLES ===================== -->
    <g class="f" fill-opacity="0.5">
      <circle cx="120"  cy="140" r="1"/>
      <circle cx="260"  cy="220" r="0.9"/>
      <circle cx="440"  cy="90"  r="1.1"/>
      <circle cx="590"  cy="200" r="0.9"/>
      <circle cx="1000" cy="140" r="0.9"/>
      <circle cx="1140" cy="230" r="1"/>
      <circle cx="1320" cy="100" r="1"/>
      <circle cx="1480" cy="200" r="0.9"/>
      <circle cx="220"  cy="330" r="0.9"/>
      <circle cx="1420" cy="330" r="0.9"/>
      <circle cx="820"  cy="170" r="0.9"/>
    </g>

    <!-- ===================== WORLD-MODEL GLOBE (top-right, off-axis) ===================== -->
    <!-- Wireframe globe with latitude / longitude lines and a slight axis tilt.
         Latitude lines are ellipses whose radii follow R*sin/cos(latitude);
         longitude lines are vertical ellipses of varying rx to simulate
         meridians at different rotations. -->
    <g transform="translate(1310, 320) rotate(-12)">
      <!-- soft glow behind the globe -->
      <circle cx="0" cy="0" r="140" fill="url(#cGlow)"/>

      <!-- Sphere silhouette -->
      <circle cx="0" cy="0" r="76" class="b"
              stroke-opacity="1" stroke-width="1.9" fill="none"/>

      <!-- Latitude lines -->
      <g class="b" stroke-opacity="0.7" stroke-width="1" fill="none">
        <ellipse cx="0" cy="0"   rx="76" ry="13"/>   <!-- equator -->
        <ellipse cx="0" cy="-26" rx="71" ry="11"/>   <!-- ~20 N -->
        <ellipse cx="0" cy="26"  rx="71" ry="11"/>   <!-- ~20 S -->
        <ellipse cx="0" cy="-48" rx="59" ry="8"/>    <!-- ~40 N -->
        <ellipse cx="0" cy="48"  rx="59" ry="8"/>    <!-- ~40 S -->
        <ellipse cx="0" cy="-63" rx="42" ry="6"/>    <!-- ~60 N -->
        <ellipse cx="0" cy="63"  rx="42" ry="6"/>    <!-- ~60 S -->
      </g>

      <!-- Longitude lines (meridians at various rotations, drawn as vertical ellipses) -->
      <g class="b" stroke-opacity="0.55" stroke-width="1" fill="none">
        <ellipse cx="0" cy="0" rx="20" ry="76"/>
        <ellipse cx="0" cy="0" rx="45" ry="76"/>
      </g>
      <!-- Prime meridian (edge-on: vertical axis line) -->
      <line x1="0" y1="-76" x2="0" y2="76"
            class="b" stroke-opacity="0.85" stroke-width="1"/>

      <!-- Poles -->
      <g class="bf" fill-opacity="1">
        <circle cx="0" cy="-76" r="2.6"/>
        <circle cx="0" cy="76"  r="2.6"/>
      </g>
    </g>
    <text x="1310" y="450" class="lbl" text-anchor="middle" fill-opacity="0.6">WORLD MODEL</text>

    <!-- ===================== GROUND POINT CLOUD ===================== -->
    <g class="f" fill-opacity="0.55">
      <!-- distant (small) -->
      <circle cx="500"  cy="470" r="0.9"/>
      <circle cx="720"  cy="465" r="0.9"/>
      <circle cx="900"  cy="470" r="0.9"/>
      <circle cx="1100" cy="468" r="0.9"/>
      <!-- far -->
      <circle cx="430"  cy="530" r="1.1"/>
      <circle cx="680"  cy="525" r="1.1"/>
      <circle cx="960"  cy="530" r="1.1"/>
      <circle cx="1180" cy="530" r="1.1"/>
      <!-- mid -->
      <circle cx="360"  cy="640" r="1.4"/>
      <circle cx="600"  cy="660" r="1.4"/>
      <circle cx="920"  cy="650" r="1.4"/>
      <circle cx="1200" cy="640" r="1.4"/>
      <circle cx="1380" cy="670" r="1.4"/>
      <!-- close -->
      <circle cx="180"  cy="760" r="1.7"/>
      <circle cx="440"  cy="800" r="1.7"/>
      <circle cx="1080" cy="780" r="1.7"/>
      <circle cx="1330" cy="800" r="1.7"/>
      <circle cx="240"  cy="900" r="2"/>
      <circle cx="540"  cy="920" r="2"/>
      <circle cx="1000" cy="900" r="2"/>
      <circle cx="1360" cy="900" r="2"/>
    </g>

    <!-- ===================== DETECTION BBOXES ===================== -->
    <g class="s" stroke-opacity="0.32" stroke-width="1.3" stroke-dasharray="5 4" fill="none">
      <rect x="1030" y="560" width="60" height="42" rx="1"/>
      <rect x="460"  y="550" width="55" height="38" rx="1"/>
      <rect x="1170" y="680" width="90" height="60" rx="2"/>
      <rect x="320"  y="700" width="100" height="70" rx="2"/>
    </g>
    <!-- Corner brackets on the nearest-left bbox (highlighted "detection") -->
    <g class="b" stroke-opacity="0.9" stroke-width="1.6" fill="none">
      <path d="M320 712 L320 700 L332 700"/>
      <path d="M408 700 L420 700 L420 712"/>
      <path d="M320 758 L320 770 L332 770"/>
      <path d="M408 770 L420 770 L420 758"/>
    </g>

    <!-- ===================== LIDAR SWEEP (from ego at bottom-left) ===================== -->
    <g class="s" stroke-opacity="0.2" stroke-width="1" fill="none">
      <ellipse cx="240" cy="1010" rx="200" ry="55"/>
      <ellipse cx="240" cy="1010" rx="360" ry="95"/>
      <ellipse cx="240" cy="1010" rx="520" ry="130"/>
      <ellipse cx="240" cy="1010" rx="700" ry="165"/>
    </g>

    <!-- ===================== PLANNED TRAJECTORY (car -> world model) ===================== -->
    <path d="M240 960 Q380 810 600 710 Q900 570 1250 380"
          class="b" stroke-opacity="0.85" stroke-width="2.2"
          stroke-dasharray="7 5" fill="none"/>

    <!-- ===================== EGO: SELF-DRIVING CAR ===================== -->
    <!-- Sleek modern EV / robotaxi silhouette (side profile) with a distinctive
         roof-mounted lidar package. -->
    <g transform="translate(240, 962)">
      <!-- Main body silhouette (smooth teardrop-ish) -->
      <path d="M-52 6
               L-52 -2
               C-52 -6 -46 -9 -38 -10
               L-24 -12
               C-20 -20 -10 -24 0 -24
               C10 -24 20 -20 24 -12
               L38 -10
               C46 -9 52 -6 52 -2
               L52 6 Z"
            class="b" stroke-opacity="1" stroke-width="1.75" fill="none"/>
      <!-- Belt-line accent (subtle) -->
      <path d="M-40 -10 L40 -10"
            class="b" stroke-opacity="0.35" stroke-width="0.9"/>
      <!-- Window glass / greenhouse (tinted) -->
      <path d="M-22 -14 C-18 -22 -8 -24 0 -24 C8 -24 18 -22 22 -14"
            class="b" stroke-opacity="0.55" stroke-width="1"
            fill="#9ee600" fill-opacity="0.18"/>
      <!-- A- and C-pillar hints -->
      <line x1="-16" y1="-22" x2="-14" y2="-14" class="b" stroke-opacity="0.5" stroke-width="0.9"/>
      <line x1="16"  y1="-22" x2="14"  y2="-14" class="b" stroke-opacity="0.5" stroke-width="0.9"/>
      <!-- Roof-mounted lidar package (the iconic sensor pod) -->
      <rect x="-7" y="-30" width="14" height="5" rx="2"
            class="b" stroke-opacity="1" stroke-width="1.25"
            fill="#9ee600" fill-opacity="0.55"/>
      <line x1="0" y1="-30" x2="0" y2="-33" class="b" stroke-opacity="0.9" stroke-width="1.1"/>
      <circle cx="0" cy="-34" r="1.4" class="bf" fill-opacity="1"/>
      <!-- Wheels (integrated, arch highlighted) -->
      <path d="M-38 6 A9 9 0 0 1 -22 6" class="b" stroke-opacity="0.6" stroke-width="1" fill="none"/>
      <path d="M22  6 A9 9 0 0 1 38  6" class="b" stroke-opacity="0.6" stroke-width="1" fill="none"/>
      <circle cx="-30" cy="6" r="6" class="b" stroke-opacity="1" stroke-width="1.5" fill="none"/>
      <circle cx="30"  cy="6" r="6" class="b" stroke-opacity="1" stroke-width="1.5" fill="none"/>
      <circle cx="-30" cy="6" r="2.4" class="b" stroke-opacity="0.55" stroke-width="1" fill="none"/>
      <circle cx="30"  cy="6" r="2.4" class="b" stroke-opacity="0.55" stroke-width="1" fill="none"/>
      <!-- Headlight (front) -->
      <line x1="49" y1="-4" x2="52" y2="-4" class="b" stroke-opacity="1" stroke-width="2.2" stroke-linecap="round"/>
      <!-- Tail light (rear) -->
      <line x1="-52" y1="-3" x2="-49" y2="-3" class="b" stroke-opacity="0.65" stroke-width="1.6" stroke-linecap="round"/>
    </g>
    <text x="240" y="1000" class="lbl" text-anchor="middle" fill-opacity="0.6">ROBOTAXI</text>

    <!-- ===================== HUMANOID ROBOT ===================== -->
    <!-- Stylized modern humanoid (Optimus / Figure / H1 aesthetic):
         dome head w/ visor, chest plate, articulated joints in green,
         slim segmented limbs, boot-like feet. -->
    <g transform="translate(1030, 705)">
      <!-- Head: rounded dome/helmet -->
      <path d="M-11 -74 Q-11 -85 0 -85 Q11 -85 11 -74 L11 -62 Q11 -58 7 -58 L-7 -58 Q-11 -58 -11 -62 Z"
            class="s" stroke-opacity="0.95" stroke-width="1.5" fill="none"/>
      <!-- Visor (glowing green eye band) -->
      <path d="M-8 -74 L8 -74 L8 -68 L-8 -68 Z"
            class="bf" fill-opacity="0.95" stroke="none"/>
      <path d="M-8 -74 L8 -74 L8 -68 L-8 -68 Z"
            class="b" stroke-opacity="1" stroke-width="0.9" fill="none"/>
      <!-- Antenna hint -->
      <line x1="0" y1="-85" x2="0" y2="-89" class="s" stroke-opacity="0.55" stroke-width="1"/>
      <circle cx="0" cy="-90" r="1" class="bf" fill-opacity="1"/>

      <!-- Neck -->
      <path d="M-4 -58 L4 -58 L4 -54 L-4 -54 Z"
            class="s" stroke-opacity="0.75" stroke-width="1.2" fill="none"/>

      <!-- Torso / chest plate (trapezoidal, tapered to waist) -->
      <path d="M-16 -54 L16 -54 L18 -40 L15 -22 L-15 -22 L-18 -40 Z"
            class="s" stroke-opacity="1" stroke-width="1.6" fill="none"/>
      <!-- Chest seam -->
      <line x1="0" y1="-54" x2="0" y2="-22" class="s" stroke-opacity="0.4" stroke-width="1"/>
      <!-- Ab / mid-panel line -->
      <line x1="-11" y1="-36" x2="11" y2="-36" class="s" stroke-opacity="0.35" stroke-width="1"/>

      <!-- Shoulder joints (prominent) -->
      <circle cx="-16" cy="-51" r="3.5" class="bf" fill-opacity="1"/>
      <circle cx="16"  cy="-51" r="3.5" class="bf" fill-opacity="1"/>
      <circle cx="-16" cy="-51" r="3.5" class="b" stroke-opacity="0.9" stroke-width="0.8" fill="none"/>
      <circle cx="16"  cy="-51" r="3.5" class="b" stroke-opacity="0.9" stroke-width="0.8" fill="none"/>

      <!-- Upper arms -->
      <path d="M-16 -51 L-22 -32" class="s" stroke-opacity="1" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M16  -51 L22  -32" class="s" stroke-opacity="1" stroke-width="2.4" stroke-linecap="round"/>
      <!-- Elbow joints -->
      <circle cx="-22" cy="-32" r="1.8" class="bf" fill-opacity="1"/>
      <circle cx="22"  cy="-32" r="1.8" class="bf" fill-opacity="1"/>
      <!-- Forearms -->
      <path d="M-22 -32 L-19 -12" class="s" stroke-opacity="1" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M22  -32 L19  -12" class="s" stroke-opacity="1" stroke-width="2.2" stroke-linecap="round"/>
      <!-- Hands (small grippers) -->
      <path d="M-19 -12 L-22 -6 M-19 -12 L-16 -6"
            class="s" stroke-opacity="0.95" stroke-width="1.4" stroke-linecap="round" fill="none"/>
      <path d="M19 -12 L16 -6 M19 -12 L22 -6"
            class="s" stroke-opacity="0.95" stroke-width="1.4" stroke-linecap="round" fill="none"/>

      <!-- Pelvis -->
      <path d="M-13 -22 L13 -22 L11 -16 L-11 -16 Z"
            class="s" stroke-opacity="0.9" stroke-width="1.4" fill="none"/>
      <!-- Hip joints -->
      <circle cx="-10" cy="-18" r="3" class="bf" fill-opacity="1"/>
      <circle cx="10"  cy="-18" r="3" class="bf" fill-opacity="1"/>

      <!-- Thighs -->
      <path d="M-10 -18 L-10 4" class="s" stroke-opacity="1" stroke-width="2.8" stroke-linecap="round"/>
      <path d="M10  -18 L10  4" class="s" stroke-opacity="1" stroke-width="2.8" stroke-linecap="round"/>
      <!-- Knee joints -->
      <circle cx="-10" cy="4" r="2.4" class="bf" fill-opacity="1"/>
      <circle cx="10"  cy="4" r="2.4" class="bf" fill-opacity="1"/>
      <!-- Shins -->
      <path d="M-10 4 L-9 26" class="s" stroke-opacity="1" stroke-width="2.6" stroke-linecap="round"/>
      <path d="M10  4 L9  26" class="s" stroke-opacity="1" stroke-width="2.6" stroke-linecap="round"/>
      <!-- Feet (boots) -->
      <path d="M-14 30 L-3 30 L-2 26 L-11 26 Z"
            class="s" stroke-opacity="1" stroke-width="1.5" fill="none"/>
      <path d="M14 30 L3 30 L2 26 L11 26 Z"
            class="s" stroke-opacity="1" stroke-width="1.5" fill="none"/>
    </g>
    <text x="1030" y="755" class="lbl" text-anchor="middle" fill-opacity="0.6">HUMANOID</text>

    <!-- ===================== LABELS ===================== -->
    <text x="60"   y="465" class="lbl">HORIZON</text>
    <text x="1420" y="965" class="lbl">PHYSICAL AI</text>
  </g>
</svg>
