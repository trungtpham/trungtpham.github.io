<?xml version="1.0" encoding="UTF-8"?>
<!--
  Ambient background for trungtpham.github.io
  Composition: a subtle "Physical AI system diagram" laid across the viewport.

    Top-left     : Lidar / radar sweep (Perception, autonomous driving)
    Top-right    : Transformer attention matrix (LLMs)
    Center       : Neural network / MLP (Machine learning)
    Middle-right : Robotic arm kinematic chain (Robotics)
    Bottom-left  : BEV road with planned trajectory (Autonomous driving)
    Bottom-right : Agent decision tree with an active node (AI agents)
    Everywhere   : BEV grid + point-cloud dots + soft dotted flow lines
                   connecting the motifs (data flow across the stack).

  Rendered in white so it composes on any dark background; the CSS uses
  `filter: invert(1) hue-rotate(180deg)` on the light theme to flip it.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000"
     preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <!-- Radial edge vignette (fades the pattern away from the center) -->
    <radialGradient id="fade" cx="50%" cy="50%" r="72%">
      <stop offset="0%"   stop-color="#fff" stop-opacity="1"/>
      <stop offset="55%"  stop-color="#fff" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <mask id="vignette">
      <rect width="100%" height="100%" fill="url(#fade)"/>
    </mask>

    <!-- BEV grid: thin cross-hair lines every 64px -->
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0 L0 0 0 64" fill="none"
            stroke="#fff" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
    <!-- Dot at each grid intersection -->
    <pattern id="gridDots" x="32" y="32" width="64" height="64" patternUnits="userSpaceOnUse">
      <circle cx="0" cy="0" r="1.1" fill="#fff" fill-opacity="0.28"/>
    </pattern>

    <!-- Directional-arrow marker for the flow lines between motifs -->
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#fff" fill-opacity="0.35"/>
    </marker>

    <style>
      .s   { stroke: #ffffff; fill: none; }
      .f   { fill: #ffffff; }
      .b   { stroke: #9ee600; }   /* NVIDIA accent (green) */
      .bf  { fill: #9ee600; }
      .lbl { font-family: 'JetBrains Mono', ui-monospace, 'SF Mono', monospace;
             font-size: 11px; letter-spacing: 0.14em; fill: #fff; fill-opacity: 0.32; }
    </style>
  </defs>

  <g mask="url(#vignette)">
    <!-- ==================== BASE LAYERS ==================== -->
    <rect width="100%" height="100%" fill="url(#grid)"/>
    <rect width="100%" height="100%" fill="url(#gridDots)"/>

    <!-- Ambient point-cloud dots scattered across the scene -->
    <g class="f" fill-opacity="0.38">
      <circle cx="380"  cy="260" r="1.2"/>
      <circle cx="520"  cy="330" r="1.2"/>
      <circle cx="700"  cy="200" r="1.2"/>
      <circle cx="880"  cy="380" r="1.2"/>
      <circle cx="620"  cy="460" r="1.2"/>
      <circle cx="460"  cy="620" r="1.2"/>
      <circle cx="720"  cy="720" r="1.2"/>
      <circle cx="900"  cy="500" r="1.2"/>
      <circle cx="1000" cy="240" r="1.2"/>
      <circle cx="820"  cy="840" r="1.2"/>
      <circle cx="560"  cy="900" r="1.2"/>
      <circle cx="960"  cy="640" r="1.2"/>
      <circle cx="1100" cy="420" r="1.2"/>
      <circle cx="1180" cy="740" r="1.2"/>
    </g>

    <!-- Dotted flow lines between motifs (perception -> LLM -> agent -> action -> env) -->
    <g class="s" stroke-opacity="0.22" stroke-width="1" stroke-dasharray="3 6"
       fill="none" marker-end="url(#arrow)">
      <path d="M340 240 Q700 130 1180 200"/>              <!-- lidar -> attention -->
      <path d="M1310 320 Q1050 380 500 500"/>             <!-- attention -> MLP -->
      <path d="M400 560 Q820 620 1200 620"/>              <!-- MLP -> robot arm -->
      <path d="M1240 700 Q950 800 1140 830"/>             <!-- robot -> agent tree -->
      <path d="M1100 900 Q680 940 320 880"/>              <!-- agent -> trajectory -->
    </g>

    <!-- ==================== TOP-LEFT : LIDAR SWEEP ==================== -->
    <g class="s" stroke-opacity="0.18" stroke-width="1">
      <circle cx="130" cy="110" r="220"/>
      <circle cx="130" cy="110" r="380"/>
      <circle cx="130" cy="110" r="540"/>
      <circle cx="130" cy="110" r="700"/>
      <circle cx="130" cy="110" r="860"/>
      <circle cx="130" cy="110" r="1020"/>
    </g>
    <!-- Sensor origin marker -->
    <g class="b" stroke-opacity="0.9" stroke-width="1.4">
      <circle cx="130" cy="110" r="5" fill="none"/>
      <line x1="118" y1="110" x2="142" y2="110"/>
      <line x1="130" y1="98"  x2="130" y2="122"/>
    </g>
    <circle cx="130" cy="110" r="2" class="bf" fill-opacity="0.95"/>
    <text x="150" y="118" class="lbl">PERCEPTION</text>

    <!-- ==================== TOP-RIGHT : TRANSFORMER ATTENTION ==================== -->
    <g transform="translate(1230, 140)">
      <text x="0" y="-14" class="lbl">ATTENTION</text>
      <g class="f">
        <!-- Row 1 -->
        <rect x="0"   y="0"  width="22" height="22" fill-opacity="0.48"/>
        <rect x="26"  y="0"  width="22" height="22" fill-opacity="0.16"/>
        <rect x="52"  y="0"  width="22" height="22" fill-opacity="0.08"/>
        <rect x="78"  y="0"  width="22" height="22" fill-opacity="0.05"/>
        <rect x="104" y="0"  width="22" height="22" fill-opacity="0.05"/>
        <rect x="130" y="0"  width="22" height="22" fill-opacity="0.09"/>
        <rect x="156" y="0"  width="22" height="22" fill-opacity="0.05"/>
        <!-- Row 2 -->
        <rect x="0"   y="26" width="22" height="22" fill-opacity="0.20"/>
        <rect x="26"  y="26" width="22" height="22" fill-opacity="0.55"/>
        <rect x="52"  y="26" width="22" height="22" fill-opacity="0.22"/>
        <rect x="78"  y="26" width="22" height="22" fill-opacity="0.09"/>
        <rect x="104" y="26" width="22" height="22" fill-opacity="0.05"/>
        <rect x="130" y="26" width="22" height="22" fill-opacity="0.07"/>
        <rect x="156" y="26" width="22" height="22" fill-opacity="0.05"/>
        <!-- Row 3 -->
        <rect x="0"   y="52" width="22" height="22" fill-opacity="0.08"/>
        <rect x="26"  y="52" width="22" height="22" fill-opacity="0.28"/>
        <rect x="52"  y="52" width="22" height="22" fill-opacity="0.60"/>
        <rect x="78"  y="52" width="22" height="22" fill-opacity="0.20"/>
        <rect x="104" y="52" width="22" height="22" fill-opacity="0.08"/>
        <rect x="130" y="52" width="22" height="22" fill-opacity="0.05"/>
        <rect x="156" y="52" width="22" height="22" fill-opacity="0.05"/>
        <!-- Row 4 -->
        <rect x="0"   y="78" width="22" height="22" fill-opacity="0.05"/>
        <rect x="26"  y="78" width="22" height="22" fill-opacity="0.10"/>
        <rect x="52"  y="78" width="22" height="22" fill-opacity="0.28"/>
        <rect x="78"  y="78" width="22" height="22" fill-opacity="0.58"/>
        <rect x="104" y="78" width="22" height="22" fill-opacity="0.20"/>
        <rect x="130" y="78" width="22" height="22" fill-opacity="0.09"/>
        <rect x="156" y="78" width="22" height="22" fill-opacity="0.05"/>
        <!-- Row 5 -->
        <rect x="0"   y="104" width="22" height="22" fill-opacity="0.05"/>
        <rect x="26"  y="104" width="22" height="22" fill-opacity="0.06"/>
        <rect x="52"  y="104" width="22" height="22" fill-opacity="0.10"/>
        <rect x="78"  y="104" width="22" height="22" fill-opacity="0.26"/>
        <rect x="104" y="104" width="22" height="22" fill-opacity="0.55"/>
        <rect x="130" y="104" width="22" height="22" fill-opacity="0.22"/>
        <rect x="156" y="104" width="22" height="22" fill-opacity="0.09"/>
        <!-- Row 6 -->
        <rect x="0"   y="130" width="22" height="22" fill-opacity="0.05"/>
        <rect x="26"  y="130" width="22" height="22" fill-opacity="0.05"/>
        <rect x="52"  y="130" width="22" height="22" fill-opacity="0.06"/>
        <rect x="78"  y="130" width="22" height="22" fill-opacity="0.10"/>
        <rect x="104" y="130" width="22" height="22" fill-opacity="0.28"/>
        <rect x="130" y="130" width="22" height="22" fill-opacity="0.60"/>
        <rect x="156" y="130" width="22" height="22" fill-opacity="0.22"/>
      </g>
    </g>

    <!-- ==================== MIDDLE-LEFT : NEURAL NET / MLP ==================== -->
    <g transform="translate(180, 520)">
      <text x="0" y="-16" class="lbl">TRANSFORMER</text>
      <g class="s" stroke-opacity="0.22" stroke-width="0.8">
        <!-- Layer 1 -> 2 -->
        <line x1="0"  y1="0"  x2="90" y2="-20"/>
        <line x1="0"  y1="0"  x2="90" y2="30"/>
        <line x1="0"  y1="0"  x2="90" y2="80"/>
        <line x1="0"  y1="35" x2="90" y2="-20"/>
        <line x1="0"  y1="35" x2="90" y2="30"/>
        <line x1="0"  y1="35" x2="90" y2="80"/>
        <line x1="0"  y1="70" x2="90" y2="-20"/>
        <line x1="0"  y1="70" x2="90" y2="30"/>
        <line x1="0"  y1="70" x2="90" y2="80"/>
        <line x1="0"  y1="105" x2="90" y2="-20"/>
        <line x1="0"  y1="105" x2="90" y2="30"/>
        <line x1="0"  y1="105" x2="90" y2="80"/>
        <!-- Layer 2 -> 3 -->
        <line x1="90" y1="-20" x2="180" y2="15"/>
        <line x1="90" y1="-20" x2="180" y2="55"/>
        <line x1="90" y1="30"  x2="180" y2="15"/>
        <line x1="90" y1="30"  x2="180" y2="55"/>
        <line x1="90" y1="80"  x2="180" y2="15"/>
        <line x1="90" y1="80"  x2="180" y2="55"/>
      </g>
      <g class="f" fill-opacity="0.55">
        <circle cx="0"  cy="0"    r="3.5"/>
        <circle cx="0"  cy="35"   r="3.5"/>
        <circle cx="0"  cy="70"   r="3.5"/>
        <circle cx="0"  cy="105"  r="3.5"/>
        <circle cx="90" cy="-20"  r="3.5"/>
        <circle cx="90" cy="30"   r="3.5"/>
        <circle cx="90" cy="80"   r="3.5"/>
        <circle cx="180" cy="15"  r="3.5"/>
        <circle cx="180" cy="55"  r="3.5"/>
      </g>
    </g>

    <!-- ==================== MIDDLE-RIGHT : ROBOT ARM ==================== -->
    <g transform="translate(1240, 500)">
      <text x="0" y="-16" class="lbl">ACTION</text>
      <!-- Base -->
      <g class="s" stroke-opacity="0.55" stroke-width="2" stroke-linecap="round">
        <line x1="-10" y1="140" x2="70" y2="140"/>
      </g>
      <!-- Kinematic chain -->
      <g class="s" stroke-opacity="0.5" stroke-width="2.5" stroke-linecap="round">
        <line x1="30" y1="140" x2="30"  y2="80"/>
        <line x1="30" y1="80"  x2="130" y2="30"/>
        <line x1="130" y1="30" x2="200" y2="70"/>
      </g>
      <!-- Joints -->
      <g class="f" fill-opacity="0.7">
        <circle cx="30"  cy="140" r="5"/>
        <circle cx="30"  cy="80"  r="4"/>
        <circle cx="130" cy="30"  r="4"/>
      </g>
      <!-- End effector / gripper -->
      <g class="s" stroke-opacity="0.6" stroke-width="1.6" stroke-linecap="round">
        <path d="M200 70 L214 60"/>
        <path d="M200 70 L214 80"/>
      </g>
      <circle cx="200" cy="70" r="3.5" class="bf" fill-opacity="0.9"/>
    </g>

    <!-- ==================== BOTTOM-LEFT : BEV ROAD + PLANNED TRAJECTORY ==================== -->
    <g transform="translate(140, 760)">
      <text x="0" y="-10" class="lbl">TRAJECTORY</text>
      <!-- road edges -->
      <g class="s" stroke-opacity="0.3" stroke-width="1.4">
        <path d="M0 130 Q100 70 220 50 T460 30"/>
        <path d="M0 210 Q100 150 220 130 T460 110"/>
      </g>
      <!-- dashed lane center -->
      <g class="s" stroke-opacity="0.35" stroke-width="1.2" stroke-dasharray="10 8">
        <path d="M0 170 Q100 110 220 90 T460 70"/>
      </g>
      <!-- ego planned trajectory (accent green) -->
      <g class="b" stroke-opacity="0.9" stroke-width="1.8" stroke-dasharray="4 3" fill="none">
        <path d="M40 200 Q140 145 260 125 T480 100"/>
      </g>
      <!-- ego vehicle box -->
      <rect x="28" y="190" width="24" height="16" rx="2" class="bf" fill-opacity="0.75"/>
    </g>

    <!-- ==================== BOTTOM-RIGHT : AGENT DECISION TREE ==================== -->
    <g transform="translate(1080, 800)">
      <text x="0" y="-18" class="lbl">AGENT</text>
      <g class="s" stroke-opacity="0.32" stroke-width="1">
        <line x1="100" y1="0"  x2="30"  y2="60"/>
        <line x1="100" y1="0"  x2="100" y2="60"/>
        <line x1="100" y1="0"  x2="170" y2="60"/>
        <line x1="30"  y1="60" x2="0"   y2="120"/>
        <line x1="30"  y1="60" x2="60"  y2="120"/>
        <line x1="170" y1="60" x2="140" y2="120"/>
        <line x1="170" y1="60" x2="200" y2="120"/>
      </g>
      <g class="f" fill-opacity="0.5">
        <circle cx="100" cy="0"   r="4.5"/>
        <circle cx="30"  cy="60"  r="3.5"/>
        <circle cx="170" cy="60"  r="3.5"/>
        <circle cx="0"   cy="120" r="3"/>
        <circle cx="60"  cy="120" r="3"/>
        <circle cx="140" cy="120" r="3"/>
        <circle cx="200" cy="120" r="3"/>
      </g>
      <!-- active reasoning node (accent green) -->
      <circle cx="100" cy="60" r="5" class="bf" fill-opacity="0.95"/>
      <g class="b" stroke-opacity="0.9" stroke-width="1">
        <line x1="100" y1="0"  x2="100" y2="60"/>
        <line x1="100" y1="60" x2="60"  y2="120"/>
      </g>
    </g>

    <!-- ==================== FLOATING DETECTION BBOXES ==================== -->
    <g class="s" stroke-opacity="0.28" stroke-width="1.3" stroke-dasharray="6 5" fill="none">
      <rect x="640"  y="180" width="130" height="82" rx="2"/>
      <rect x="800"  y="560" width="110" height="70" rx="2"/>
      <rect x="440"  y="420" width="90"  height="58" rx="2"/>
    </g>
  </g>
</svg>
